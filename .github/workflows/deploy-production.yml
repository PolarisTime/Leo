name: production-deploy
run-name: "production deploy: Leo ${{ inputs.leo_ref || github.ref_name }} / target=${{ inputs.deploy_target || 'local' }} / dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      leo_ref:
        description: "Backend Git ref to deploy"
        required: true
        default: "main"
        type: string
      dry_run:
        description: "Build and package only; do not deploy to production"
        required: true
        default: true
        type: boolean
      deploy_target:
        description: "Production deploy target"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - ssh
      flyway_target:
        description: "Highest Flyway version allowed in production"
        required: true
        default: "19"
        type: string
      release_note:
        description: "Optional release note"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FLYWAY_TARGET: ${{ inputs.flyway_target || vars.PROD_FLYWAY_TARGET }}

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leo
          POSTGRES_USER: leo
          POSTGRES_PASSWORD: leo_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leo -d leo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        shell: bash
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/leo
      SPRING_DATASOURCE_USERNAME: leo
      SPRING_DATASOURCE_PASSWORD: leo_ci_password
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 3
      SPRING_DATA_REDIS_PASSWORD: ""
      LEO_JWT_SECRET: ci-jwt-secret-ci-jwt-secret-ci-jwt-secret
      TOTP_ENCRYPTION_KEY: ci-totp-secret-ci-totp-secret-ci-totp
      LEO_MACHINE_ID: 1
    steps:
      - name: Checkout Leo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.leo_ref || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Static analysis
        run: mvn -B -ntp -DskipTests checkstyle:check spotbugs:spotbugs

      - name: Test
        run: mvn -B -ntp test

      - name: Validate production Flyway target
        run: |
          set -euo pipefail
          : "${FLYWAY_TARGET:?Missing production Flyway target}"
          if [[ ! "$FLYWAY_TARGET" =~ ^[1-9][0-9]*$ ]]; then
            echo "Production Flyway target must be a positive integer version: $FLYWAY_TARGET" >&2
            exit 1
          fi

      - name: Verify Flyway migrations
        run: |
          mvn -B -ntp flyway:migrate \
            -Dflyway.url="$SPRING_DATASOURCE_URL" \
            -Dflyway.user="$SPRING_DATASOURCE_USERNAME" \
            -Dflyway.password="$SPRING_DATASOURCE_PASSWORD" \
            -Dflyway.target="$FLYWAY_TARGET" \
            -Dflyway.locations="filesystem:src/main/resources/db/migration" \
            -Dflyway.cleanDisabled=true \
            -Dflyway.placeholderReplacement=false \
            -Dflyway.validateMigrationNaming=true
          mvn -B -ntp flyway:validate \
            -Dflyway.url="$SPRING_DATASOURCE_URL" \
            -Dflyway.user="$SPRING_DATASOURCE_USERNAME" \
            -Dflyway.password="$SPRING_DATASOURCE_PASSWORD" \
            -Dflyway.target="$FLYWAY_TARGET" \
            -Dflyway.locations="filesystem:src/main/resources/db/migration" \
            -Dflyway.cleanDisabled=true \
            -Dflyway.placeholderReplacement=false \
            -Dflyway.validateMigrationNaming=true

      - name: Package
        run: mvn -B -ntp -DskipTests package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: leo-backend-jar
          path: target/*.jar
          if-no-files-found: error

  package:
    name: Package Release
    needs:
      - backend
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Leo deploy scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.leo_ref || github.ref_name }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: leo-backend-jar
          path: release-input/backend

      - name: Create production release archive
        run: |
          set -euo pipefail
          leo_sha="$(git rev-parse HEAD)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_id="leo-backend-${GITHUB_REF_NAME}"
          else
            release_id="leo-${GITHUB_RUN_NUMBER}-${leo_sha::12}"
          fi
          mkdir -p release/deploy
          backend_jar="$(find release-input/backend -maxdepth 1 -type f -name '*.jar' | head -1)"
          if [[ -z "$backend_jar" ]]; then
            echo "Backend jar artifact not found" >&2
            exit 1
          fi
          cp "$backend_jar" release/leo.jar
          cp scripts/deploy/install-production-release.sh release/deploy/
          cp scripts/deploy/steelx-process.sh release/deploy/
          jq -n \
            --arg releaseId "$release_id" \
            --arg leoRef "${{ inputs.leo_ref || github.ref_name }}" \
            --arg leoSha "$leo_sha" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runNumber "$GITHUB_RUN_NUMBER" \
            --arg deployTarget "${{ inputs.deploy_target || 'local' }}" \
            --arg flywayTarget "$FLYWAY_TARGET" \
            --argjson dryRun "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}" \
            --arg releaseNote "${{ inputs.release_note || '' }}" \
            '{
              releaseId: $releaseId,
              leoRef: $leoRef,
              leoSha: $leoSha,
              runId: $runId,
              runNumber: $runNumber,
              deployTarget: $deployTarget,
              flywayTarget: $flywayTarget,
              dryRun: $dryRun,
              releaseNote: $releaseNote
            }' > release/manifest.json
          archive_name="${release_id}.tar.gz"
          tar -C release -czf "$archive_name" .
          sha256sum "$archive_name" > "${archive_name}.sha256"
          cp "$archive_name" leo-production-release.tar.gz
          sha256sum leo-production-release.tar.gz > leo-production-release.tar.gz.sha256

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: leo-production-release
          path: |
            leo-*.tar.gz
            leo-*.tar.gz.sha256
            leo-production-release.tar.gz
            leo-production-release.tar.gz.sha256
          if-no-files-found: error

  dry-run:
    name: Dry Run Summary
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "Dry run completed. Release archive was built but not deployed."
          echo "Leo ref:   ${{ inputs.leo_ref || github.ref_name }}"
          echo "Target:    ${{ inputs.deploy_target || 'local' }}"
          echo "Flyway:   $FLYWAY_TARGET"

  deploy-local:
    name: Deploy Production Local
    needs: package
    if: ${{ (github.event_name == 'push' || !inputs.dry_run) && (github.event_name == 'push' || inputs.deploy_target == 'local') }}
    runs-on:
      - self-hosted
      - linux
      - steelx-production
    environment: production
    defaults:
      run:
        shell: bash
    env:
      PROD_RELEASE_ROOT: ${{ vars.PROD_RELEASE_ROOT || '/instance/steelx/backend' }}
      PROD_SHARED_DIR: ${{ vars.PROD_SHARED_DIR || '/instance/steelx/shared' }}
      PROD_BACKEND_SERVICE: ${{ vars.PROD_BACKEND_SERVICE || 'steelx-local' }}
      PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL || 'http://127.0.0.1:57217/api/health' }}
      PROD_KEEP_RELEASES: ${{ vars.PROD_KEEP_RELEASES || '5' }}
      PROD_START_COMMAND: ${{ vars.PROD_START_COMMAND || 'STEELX_ROOT=/instance/steelx bash /instance/steelx/shared/steelx-process.sh start' }}
      PROD_STOP_COMMAND: ${{ vars.PROD_STOP_COMMAND || 'STEELX_ROOT=/instance/steelx bash /instance/steelx/shared/steelx-process.sh stop' }}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "127.0.0.1,localhost"
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: leo-production-release
          path: production-release

      - name: Extract deploy scripts
        run: |
          set -euo pipefail
          mkdir -p production-release/extracted
          (cd production-release && sha256sum -c leo-production-release.tar.gz.sha256)
          tar -xzf production-release/leo-production-release.tar.gz -C production-release/extracted
          chmod 0755 production-release/extracted/deploy/install-production-release.sh
          chmod 0755 production-release/extracted/deploy/steelx-process.sh

      - name: Verify local production Flyway target
        run: |
          set -euo pipefail
          : "${FLYWAY_TARGET:?Missing production Flyway target}"
          if [[ ! "$FLYWAY_TARGET" =~ ^[1-9][0-9]*$ ]]; then
            echo "Production Flyway target must be a positive integer version: $FLYWAY_TARGET" >&2
            exit 1
          fi
          expected_flyway_target="$FLYWAY_TARGET"
          if [[ ! -d "$PROD_SHARED_DIR" ]]; then
            echo "Local production shared directory is not initialized: $PROD_SHARED_DIR" >&2
            echo "Run scripts/deploy/trigger-local-steelx-deploy.sh once on the host before enabling automated deployment." >&2
            exit 1
          fi
          if [[ ! -f "$PROD_SHARED_DIR/steelx.env" ]]; then
            echo "Missing production env file: $PROD_SHARED_DIR/steelx.env" >&2
            exit 1
          fi
          runtime_flyway_target="$(awk '
            $0 ~ /^SPRING_FLYWAY_TARGET=/ {
              count++
              value = substr($0, length("SPRING_FLYWAY_TARGET=") + 1)
            }
            END {
              if (count != 1) exit 1
              print value
            }
          ' "$PROD_SHARED_DIR/steelx.env" 2>/dev/null || true)"
          if [[ "$runtime_flyway_target" != "$expected_flyway_target" ]]; then
            echo "Production SPRING_FLYWAY_TARGET must equal requested target $expected_flyway_target; found ${runtime_flyway_target:-<empty>}" >&2
            exit 1
          fi
          echo "Verified production Flyway target: $expected_flyway_target"
          mkdir -p "$PROD_RELEASE_ROOT"
          install -m 0755 production-release/extracted/deploy/steelx-process.sh "$PROD_SHARED_DIR/steelx-process.sh"

      - name: Install release on local production
        run: |
          set -euo pipefail
          bash production-release/extracted/deploy/install-production-release.sh \
            --archive production-release/leo-production-release.tar.gz \
            --sha256-file production-release/leo-production-release.tar.gz.sha256 \
            --release-root "$PROD_RELEASE_ROOT" \
            --shared-dir "$PROD_SHARED_DIR" \
            --backend-service "$PROD_BACKEND_SERVICE" \
            --healthcheck-url "$PROD_HEALTHCHECK_URL" \
            --keep-releases "$PROD_KEEP_RELEASES" \
            --start-command "$PROD_START_COMMAND" \
            --stop-command "$PROD_STOP_COMMAND"

  deploy-ssh:
    name: Deploy Production SSH
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && inputs.deploy_target == 'ssh' }}
    runs-on:
      - self-hosted
      - linux
      - steelx-production
    environment: production
    defaults:
      run:
        shell: bash
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
      PROD_RELEASE_ROOT: ${{ vars.PROD_RELEASE_ROOT || '/instance/steelx/backend' }}
      PROD_SHARED_DIR: ${{ vars.PROD_SHARED_DIR || '/instance/steelx/shared' }}
      PROD_BACKEND_SERVICE: ${{ vars.PROD_BACKEND_SERVICE || 'steelx-local' }}
      PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL || 'http://127.0.0.1:57217/api/health' }}
      PROD_KEEP_RELEASES: ${{ vars.PROD_KEEP_RELEASES || '5' }}
      PROD_START_COMMAND: ${{ vars.PROD_START_COMMAND || 'STEELX_ROOT=/instance/steelx bash /instance/steelx/shared/steelx-process.sh start' }}
      PROD_STOP_COMMAND: ${{ vars.PROD_STOP_COMMAND || 'STEELX_ROOT=/instance/steelx bash /instance/steelx/shared/steelx-process.sh stop' }}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "127.0.0.1,localhost"
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: leo-production-release
          path: production-release

      - name: Extract deploy scripts
        run: |
          set -euo pipefail
          mkdir -p production-release/extracted
          (cd production-release && sha256sum -c leo-production-release.tar.gz.sha256)
          tar -xzf production-release/leo-production-release.tar.gz -C production-release/extracted
          chmod 0755 production-release/extracted/deploy/install-production-release.sh

      - name: Configure SSH
        run: |
          set -euo pipefail
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST secret}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER secret}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY secret}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/leo-production"
          chmod 600 "$HOME/.ssh/leo-production"
          if [[ -n "$PROD_SSH_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$PROD_SSH_PORT" "$PROD_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Verify SSH production Flyway target
        run: |
          set -euo pipefail
          : "${FLYWAY_TARGET:?Missing production Flyway target}"
          if [[ ! "$FLYWAY_TARGET" =~ ^[1-9][0-9]*$ ]]; then
            echo "Production Flyway target must be a positive integer version: $FLYWAY_TARGET" >&2
            exit 1
          fi
          quote() { printf '%q' "$1"; }
          remote_command="sudo bash -s -- $(quote "$PROD_SHARED_DIR") $(quote "$FLYWAY_TARGET")"
          ssh -i "$HOME/.ssh/leo-production" \
            -p "$PROD_SSH_PORT" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "$remote_command" <<'REMOTE'
          set -euo pipefail
          shared_dir="$1"
          expected_flyway_target="$2"
          env_file="$shared_dir/steelx.env"
          if [[ ! -f "$env_file" ]]; then
            echo "Missing production env file: $env_file" >&2
            exit 1
          fi
          runtime_flyway_target="$(awk '
            $0 ~ /^SPRING_FLYWAY_TARGET=/ {
              count++
              value = substr($0, length("SPRING_FLYWAY_TARGET=") + 1)
            }
            END {
              if (count != 1) exit 1
              print value
            }
          ' "$env_file" 2>/dev/null || true)"
          if [[ "$runtime_flyway_target" != "$expected_flyway_target" ]]; then
            echo "Production SPRING_FLYWAY_TARGET must equal requested target $expected_flyway_target; found ${runtime_flyway_target:-<empty>}" >&2
            exit 1
          fi
          echo "Verified production Flyway target: $expected_flyway_target"
          REMOTE

      - name: Upload release archive
        run: |
          set -euo pipefail
          remote_dir="/tmp/leo-production-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          ssh -i "$HOME/.ssh/leo-production" \
            -p "$PROD_SSH_PORT" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "mkdir -p '$remote_dir'"
          scp -i "$HOME/.ssh/leo-production" \
            -P "$PROD_SSH_PORT" \
            production-release/leo-production-release.tar.gz \
            production-release/leo-production-release.tar.gz.sha256 \
            production-release/extracted/deploy/steelx-process.sh \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}:${remote_dir}/"
          echo "REMOTE_DEPLOY_DIR=${remote_dir}" >> "$GITHUB_ENV"
          echo "REMOTE_ARCHIVE=${remote_dir}/leo-production-release.tar.gz" >> "$GITHUB_ENV"
          echo "REMOTE_SHA256=${remote_dir}/leo-production-release.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Install release on production
        run: |
          set -euo pipefail
          quote() { printf '%q' "$1"; }
          remote_process_install="sudo mkdir -p $(quote "$PROD_SHARED_DIR") && sudo install -m 0755 $(quote "$REMOTE_DEPLOY_DIR/steelx-process.sh") $(quote "$PROD_SHARED_DIR/steelx-process.sh")"
          ssh -i "$HOME/.ssh/leo-production" \
            -p "$PROD_SSH_PORT" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "$remote_process_install"
          remote_command="sudo bash -s --"
          remote_command+=" --archive $(quote "$REMOTE_ARCHIVE")"
          remote_command+=" --sha256-file $(quote "$REMOTE_SHA256")"
          remote_command+=" --release-root $(quote "$PROD_RELEASE_ROOT")"
          remote_command+=" --shared-dir $(quote "$PROD_SHARED_DIR")"
          remote_command+=" --backend-service $(quote "$PROD_BACKEND_SERVICE")"
          remote_command+=" --healthcheck-url $(quote "$PROD_HEALTHCHECK_URL")"
          remote_command+=" --keep-releases $(quote "$PROD_KEEP_RELEASES")"
          if [[ -n "$PROD_START_COMMAND" ]]; then
            remote_command+=" --start-command $(quote "$PROD_START_COMMAND")"
          fi
          if [[ -n "$PROD_STOP_COMMAND" ]]; then
            remote_command+=" --stop-command $(quote "$PROD_STOP_COMMAND")"
          fi
          ssh -i "$HOME/.ssh/leo-production" \
            -p "$PROD_SSH_PORT" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "$remote_command" < production-release/extracted/deploy/install-production-release.sh
