server {
    listen 80;
    server_name in1ove.com;

    return 301 https://in1ove.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name in1ove.com;

    ssl_certificate /instance/ssl/fullchain.crt;
    ssl_certificate_key /instance/ssl/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:STEELXSSL:10m;
    ssl_session_timeout 10m;

    root /instance/steelx/frontend/current;
    index index.html;

    client_max_body_size 25m;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:57217/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
