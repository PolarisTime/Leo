groups:
  - name: leo-availability
    rules:
      - alert: LeoBackendUnavailable
        expr: up{job="leo-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Leo 后端指标端点不可用

      - alert: LeoBackendHighErrorRate
        expr: >-
          sum(rate(http_server_requests_seconds_count{job="leo-backend",status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{job="leo-backend"}[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Leo 后端 5xx 比例连续 5 分钟超过 5%

  - name: leo-reliable-events
    rules:
      - alert: LeoReliableEventBacklog
        expr: leo_business_events_incomplete > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Leo 存在未完成业务事件

      - alert: LeoReliableEventStalled
        expr: leo_business_events_oldest_age_seconds > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Leo 最早未完成业务事件已等待超过 15 分钟

  - name: leo-operation-log-partitions
    rules:
      - alert: LeoOperationLogDefaultPartitionUsed
        expr: leo_operation_log_default_partition_rows > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Leo 操作日志已有数据落入默认分区

      - alert: LeoOperationLogPartitionsRunningOut
        expr: leo_operation_log_partition_months_available < 6
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Leo 操作日志未来连续可用月分区不足 6 个月

      - alert: LeoOperationLogRetentionExceeded
        expr: leo_operation_log_expired_rows > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: Leo 存在超过 12 个月保留期的活动操作日志
