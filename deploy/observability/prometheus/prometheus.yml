global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: leo-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 127.0.0.1:57218
        labels:
          service: leo

  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
