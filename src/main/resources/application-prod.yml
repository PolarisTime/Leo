leo:
  auth:
    cookie:
      # 生产环境默认仅通过 HTTPS 发送 refresh token cookie
      secure: ${LEO_AUTH_REFRESH_COOKIE_SECURE:true}
      # 生产环境默认进一步收紧跨站携带策略
      same-site: ${LEO_AUTH_REFRESH_COOKIE_SAME_SITE:Strict}
  health:
    page:
      # 生产环境默认关闭 HTML 健康页
      enabled: ${LEO_HEALTH_PAGE_ENABLED:false}
  surface:
    health:
      # 生产环境默认不向匿名请求暴露健康页
      public-access-enabled: ${LEO_HEALTH_PAGE_PUBLIC_ACCESS_ENABLED:false}
    docs:
      # 生产环境默认不向匿名请求暴露 OpenAPI / Swagger 文档
      public-access-enabled: ${LEO_DOCS_PUBLIC_ACCESS_ENABLED:false}
  security:
    web:
      headers:
        # 生产环境 HTTPS 就绪后默认启用 HSTS
        hsts-enabled: ${LEO_SECURITY_HSTS_ENABLED:true}
  database:
    import:
      # 生产环境默认禁止通过备份文件导入数据库，需显式开启。
      enabled: ${LEO_DATABASE_IMPORT_ENABLED:false}
  id:
    # 生产环境默认禁止使用 machine-id=0，避免多实例部署 ID 冲突。
    strict-machine-id: ${LEO_ID_STRICT_MACHINE_ID:true}
  maintenance:
    database-backup:
      # PR7 起生产备份职责外部化，应用内定时备份默认关闭。
      enabled: ${LEO_MAINTENANCE_DATABASE_BACKUP_ENABLED:false}

spring:
  ai:
    mcp:
      server:
        # 生产环境默认关闭 MCP，只允许通过显式环境变量开启。
        enabled: ${SPRING_AI_MCP_SERVER_ENABLED:false}
  datasource:
    # 生产环境默认连接 prod 库，可通过 SPRING_DATASOURCE_URL 或 SPRING_DATASOURCE_DB 覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:prod}}
  jpa:
    properties:
      hibernate:
        # 生产环境不需要 SQL 格式化输出
        format_sql: false

management:
  tracing:
    sampling:
      # 生产默认按 10% 采样；排障时可临时通过环境变量提高。
      probability: ${LEO_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    com.leo.erp.system.web.HealthPageController: WARN
